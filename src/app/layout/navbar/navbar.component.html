<nav
  class="fixed top-6 left-1/2 -translate-x-1/2 z-50 flex items-center gap-1 px-2 py-2 rounded-[3rem] transition-all duration-500"
  [class]="scrollState.isScrolled()
    ? 'bg-charcoal/80 backdrop-blur-xl shadow-lg shadow-black/20 border border-white/5'
    : 'bg-transparent'"
>
  <!-- Logo / Name -->
  <a
    href="#hero"
    (click)="scrollTo('hero', $event)"
    class="px-4 py-2 font-display font-semibold text-sm tracking-wide text-cream hover:text-clay transition-colors duration-300"
  >
    DP
  </a>

  <!-- Nav Links -->
  <div class="hidden md:flex items-center gap-1">
    <a
      href="#hero"
      (click)="scrollTo('hero', $event)"
      class="px-3 py-2 text-sm text-cream/60 hover:text-cream transition-colors duration-300"
    >Home</a>
    <a
      href="#work"
      (click)="scrollTo('work', $event)"
      class="px-3 py-2 text-sm text-cream/60 hover:text-cream transition-colors duration-300"
    >Work</a>
    <a
      href="#about"
      (click)="scrollTo('about', $event)"
      class="px-3 py-2 text-sm text-cream/60 hover:text-cream transition-colors duration-300"
    >About</a>
    <a
      href="#contact"
      (click)="scrollTo('contact', $event)"
      class="px-3 py-2 text-sm text-cream/60 hover:text-cream transition-colors duration-300"
    >Contact</a>

    <span class="w-px h-4 bg-cream/10 mx-1"></span>

    <a
      routerLink="/devlog"
      routerLinkActive="text-clay!"
      class="px-3 py-2 text-sm font-mono text-cream/60 hover:text-cream transition-colors duration-300"
    >Devlog</a>
  </div>

  <!-- CTA Button -->
  <a
    #ctaButton
    href="#contact"
    (click)="scrollTo('contact', $event)"
    class="ml-2 px-5 py-2 bg-clay text-cream text-sm font-semibold rounded-[3rem] hover:bg-clay-light transition-colors duration-300 will-change-transform"
  >
    Let's Talk
  </a>
</nav>
