<div
  class="card-wrapper h-full flex flex-col bg-charcoal-light/80 rounded-[1.5rem] p-6 md:p-8
         border border-cream/[0.06]"
>
  <!-- Header -->
  <div class="mb-6 min-h-[5.5rem]">
    <p class="font-mono text-xs tracking-[0.2em] uppercase text-clay font-semibold mb-2">
      02 — Content Creator
    </p>
    <p class="text-cream/40 text-sm mt-2 leading-relaxed">
      Broadcast · Social · Campaign — daily content at Brazil's largest network.
    </p>
  </div>

  <!-- Typewriter display -->
  <div class="relative h-56 md:h-64 mb-6 flex-1 rounded-lg bg-[#141210] border border-cream/[0.06] p-5 flex flex-col">
    <!-- Format label -->
    <div class="flex items-center gap-2 mb-4">
      <span
        class="inline-block w-1.5 h-1.5 rounded-full transition-colors duration-500"
        [style.background-color]="activePiece().accent"
      ></span>
      <span
        class="font-mono text-[0.65rem] tracking-[0.15em] uppercase font-medium transition-colors duration-500"
        [style.color]="activePiece().accent"
      >
        {{ activePiece().format }}
      </span>
    </div>

    <!-- Typed text -->
    <div class="flex-1 flex items-start">
      <p class="font-serif text-lg md:text-xl text-cream/80 leading-relaxed italic">
        {{ displayedText() }}<span
          class="cursor inline-block w-0.5 h-[1.1em] bg-clay/80 ml-0.5 align-text-bottom not-italic"
        ></span>
      </p>
    </div>

    <!-- Source line -->
    <div class="mt-auto pt-4 border-t border-cream/[0.04]">
      <span class="font-mono text-[0.6rem] text-cream/20">
        {{ activePiece().source }}
      </span>
    </div>
  </div>

  <!-- Footer with progress dots -->
  <div class="flex items-center justify-between">
    <div class="flex gap-1.5">
      @for (piece of pieces; track piece.format) {
        <span
          [class]="'w-1.5 h-1.5 rounded-full transition-colors duration-300 ' + ($index === activeIndex() ? 'bg-clay' : 'bg-cream/15')"
        ></span>
      }
    </div>
    <span class="font-mono text-[0.6rem] tracking-wider uppercase text-cream/20">
      auto
    </span>
  </div>
</div>
