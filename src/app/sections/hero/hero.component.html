<section
  #heroSection
  id="hero"
  class="relative h-dvh w-full overflow-hidden flex items-end"
>
  <!-- Background Image -->
  <div class="absolute inset-0">
    <img
      src="assets/images/hero-forest.webp"
      alt=""
      class="hero-image h-full w-full object-cover"
      loading="eager"
      fetchpriority="high"
    />
    <!-- Gradient Overlay -->
    <div class="absolute inset-0 bg-gradient-to-t from-charcoal via-charcoal/60 to-transparent"></div>
    <div class="absolute inset-0 bg-gradient-to-r from-charcoal/80 via-transparent to-transparent"></div>
  </div>

  <!-- Content — Bottom Left -->
  <div class="relative z-10 max-w-3xl px-8 pb-24 md:px-16 md:pb-32">
    <!-- Overline -->
    <p class="hero-overline font-mono text-sm md:text-base tracking-widest uppercase text-clay mb-6">
      Developer · Creator · Problem Solver
    </p>

    <!-- Title -->
    <h1 class="mb-6">
      <span class="hero-title-line block font-sans font-extrabold text-5xl md:text-7xl lg:text-8xl text-cream leading-[0.95]">
        Technical Creative
      </span>
      <span class="hero-title-line block font-serif italic font-medium text-4xl md:text-6xl lg:text-7xl text-cream/80 mt-2">
        who ships.
      </span>
    </h1>

    <!-- Subtitle -->
    <p class="hero-subtitle text-cream/50 text-lg md:text-xl max-w-lg leading-relaxed mb-8">
      Enterprise software for the federal government. Live broadcast for a hundred million viewers.
      I learn fast and I build things that work.
    </p>

    <!-- CTA -->
    <a
      href="#work"
      class="hero-cta inline-flex items-center gap-2 px-8 py-4 bg-clay text-cream font-semibold rounded-[3rem] hover:bg-clay-light transition-colors duration-300 text-base"
    >
      See My Work
      <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M19 14l-7 7m0 0l-7-7m7 7V3"/>
      </svg>
    </a>
  </div>
</section>
