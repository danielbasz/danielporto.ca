<section id="contact" class="relative px-6 md:px-16 py-24 md:py-32">
  <div class="max-w-xl mx-auto">

    <!-- Header -->
    <div class="mb-12 text-center" dpFadeUp>
      <p class="font-mono text-xs tracking-[0.2em] uppercase text-clay mb-4">
        Get In Touch
      </p>
      <h2 class="font-display text-3xl md:text-5xl font-bold text-cream leading-tight">
        How about some coffee?
      </h2>
    </div>

    <!-- Success state -->
    @if (submitted) {
      <div class="text-center py-12" dpFadeUp>
        <p class="text-cream/80 text-lg font-serif italic mb-8">
          Thanks for reaching out! I'll get back to you soon.
        </p>
        <button
          (click)="reset()"
          class="px-8 py-4 bg-clay text-cream font-semibold rounded-[3rem] hover:bg-clay-light transition-colors duration-300"
        >
          Send Another
        </button>
      </div>
    } @else {
      <!-- Form -->
      <form (submit)="onSubmit($event)" class="flex flex-col gap-6">

        <div class="flex flex-col gap-2">
          <label for="email" class="font-mono text-xs tracking-[0.15em] uppercase text-cream/50">
            Email Address
          </label>
          <input
            id="email"
            type="email"
            name="email"
            required
            placeholder="your@email.com"
            class="w-full px-5 py-4 bg-charcoal-light border border-cream/10 rounded-[1rem] text-cream placeholder-cream/30 font-sans text-base focus:outline-none focus:border-clay transition-colors duration-200"
          />
        </div>

        <div class="flex flex-col gap-2">
          <label for="message" class="font-mono text-xs tracking-[0.15em] uppercase text-cream/50">
            Message
          </label>
          <textarea
            id="message"
            name="message"
            required
            rows="5"
            placeholder="Your message..."
            class="w-full px-5 py-4 bg-charcoal-light border border-cream/10 rounded-[1rem] text-cream placeholder-cream/30 font-sans text-base focus:outline-none focus:border-clay transition-colors duration-200 resize-vertical min-h-[140px]"
          ></textarea>
        </div>

        @if (error) {
          <p class="text-red-400 text-sm font-mono">{{ error }}</p>
        }

        <button
          type="submit"
          [disabled]="submitting"
          class="w-full px-8 py-4 bg-clay text-cream font-semibold rounded-[3rem] hover:bg-clay-light transition-colors duration-300 disabled:opacity-50 disabled:cursor-not-allowed mt-2"
        >
          {{ submitting ? 'Sending...' : 'Send Message' }}
        </button>
      </form>
    }

    <!-- Direct email fallback -->
    <p class="text-center text-cream/30 text-sm font-mono mt-12">
      Or email me directly at
      <a href="mailto:hello@danielporto.ca" class="text-clay hover:text-clay-light transition-colors">
        hello&#64;danielporto.ca
      </a>
    </p>

  </div>
</section>
